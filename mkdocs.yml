site_name: Plwy's Tech Notes
site_description: 技术笔记与学习记录
site_author: Plwy
site_url: https://Plwy.github.io/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Plwy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed
  - toc:
      permalink: true

nav:
  - Home: index.md
  - 分类:
    - 分类总览: categories/index.md
    - 深度学习部署: categories/deploy.md
    - C++ 工程实践: categories/cpp.md
    - Python 自动化: categories/python.md
  - 最新文章: latest.md
  - 关于: about.md
  - 技术笔记:
    - 深度学习部署:
      - TensorRT 简介: notes/tensorrt-intro.md
      - 量化技术: notes/quantization.md
      - 模型剪枝: notes/network-pruning.md
      - 知识蒸馏: notes/knowledge-distillation.md
      - Triton 上线检查清单: articles/deploy/triton-rollout-checklist.md
      - 动态 Shape 的性能观察: articles/deploy/dynamic-shape-observations.md
    - C++ 工程实践:
      - Cache Friendly 的结构体设计: articles/cpp/cache-friendly-vector.md
      - 线程池任务切分的几个坑: articles/cpp/thread-pool-boundaries.md
    - Python 自动化:
      - 实验记录脚本的最小闭环: articles/python/experiment-tracker.md
      - 批量清洗日志的脚本模板: articles/python/log-cleanup-pipeline.md
  - 标签: tags.md
